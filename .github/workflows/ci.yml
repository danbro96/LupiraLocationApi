name: ci

on:
  pull_request:
  push:
    branches-ignore:
      - main
  workflow_call:

jobs:
  backend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - run: dotnet restore LupiraLocationApi.slnx
      - run: dotnet build LupiraLocationApi.slnx --no-restore -c Release
      # Server.Tests spin up Postgres via Testcontainers (Docker is preinstalled on ubuntu-latest).
      - run: dotnet test LupiraLocationApi.slnx --no-build -c Release
