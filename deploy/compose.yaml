# lupira-location-api — TrueNAS Custom App `lupira-location-api`.
# Single .NET 10 service: REST (/api) for device management + location query, DeviceKey-authed location telemetry ingest,
# over its OWN Postgres (lupira_location). Isolated in a separate DB+role from the other Lupira apps (no cross-grants).
services:
  lupira-location-api:
    image: danbro96/lupira-location-api:${IMAGE_TAG:-latest}
    container_name: lupira-location-api
    environment:
      # Postgres — Marten `location` schema + raw `telemetry` schema in one DB. NO grant on other apps' databases.
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=lupira_location;Username=lupira_location_user;Password=${LUPIRA_LOCATION_DB_PASSWORD:?required}"

      # /api auth — Authentik OIDC (JWT). Same issuer as the other Lupira apps; the OIDC `sub` is the only cross-service join key.
      Auth__Authority: ${AUTH_AUTHORITY:-https://auth.lupira.com/application/o/lupira-location/}
      Auth__Audience: ${AUTH_AUDIENCE:-lupira-location}

      # Telemetry ingest auth is per-device API key (minted at device registration) — no extra config.

      # Reverse-geocoding for place labels — self-hosted Nominatim. Empty disables it (cache-only / coarse).
      Nominatim__BaseUrl: ${NOMINATIM_BASE_URL:-}

      # Telemetry retention + maintenance.
      Telemetry__LocationRetentionDays: ${LOCATION_RETENTION_DAYS:-90}
      Telemetry__MaintenanceEnabled: ${TELEMETRY_MAINTENANCE_ENABLED:-true}

      # OTEL — same Basic Auth header convention as the other .NET apps (http/protobuf; 5-min metric cadence).
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_PROTOCOL: ${OTEL_EXPORTER_OTLP_PROTOCOL:-http/protobuf}
      OTEL_EXPORTER_OTLP_HEADERS: ${OTEL_EXPORTER_OTLP_HEADERS:-}
      OTEL_METRIC_EXPORT_INTERVAL: ${OTEL_METRIC_EXPORT_INTERVAL:-300000}
      OTEL_RESOURCE_ATTRIBUTES: ${OTEL_RESOURCE_ATTRIBUTES:-deployment.environment=prod,host.name=medelynas,service.name=lupira-location-api}
    ports:
      - "${HOST_PORT:-41280}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/readyz || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    networks:
      - default
      - medelynas_data         # Postgres
      - medelynas_telemetry    # OTel collector
networks:
  default:
    driver: bridge
  medelynas_data:
    external: true
    name: medelynas_data
  medelynas_telemetry:
    external: true
    name: medelynas_telemetry
